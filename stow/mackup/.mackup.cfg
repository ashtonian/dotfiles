[storage]
engine = file_system
path = .dotfiles
directory = mackup

[configuration_files]
# Use copy mode instead of symlinks (required for macOS Sonoma+)
mode = copy

[applications_to_ignore]
# Apps with their own cloud sync - don't need mackup
1password
bear
day-one
todoist
notion

[applications_to_sync]
# Desktop utilities & dev tools without cloud sync
bartender
bettertouchtool
beyond-compare
contexts
dash
fork
hazel
istat-menus
iterm2
keyboard-maestro
quicklook
rectangle
sublime-text
terminal
textexpander
tower
transmit
