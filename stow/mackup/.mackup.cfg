[storage]
engine = file_system
path = .sync
# Note: sync.sh overrides this to mackup/$(hostname -s) during automated backup
# to prevent multi-machine overwrites. This default is used for manual mackup commands.
directory = mackup

[configuration_files]
# Use copy mode instead of symlinks (required for macOS Sonoma+)
mode = copy

[applications_to_ignore]
# === Managed by stow (would conflict) ===
git
zsh
ssh
gnupg

# === Contains credentials/secrets ===
aws
docker

# === Have their own cloud sync ===
1password
bear
day-one
todoist
notion
obsidian
spotify
slack
discord
dropbox
google-chrome
firefox
brave
signal
telegram
whatsapp
zoom
microsoft-teams
vscode
